<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Edu+AU+VIC+WA+NT+Hand:wght@400..700&family=Jura:wght@300..700&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class = "navbar">
            <div>
                <img src = "images/logo.png" alt = "GPU Catalog" height = "140">
            </div>
            <div class = "navbar">
                <button class = "nav_btn" onclick="window.location.href = 'index.html'">
                    Главная
                </button>
                <button class = "nav_btn" onclick="window.location.href = 'catalog.html'">
                    Каталог
                </button>
                <button class = "nav_btn" onclick="window.location.href = 'order.html'">
                    Сделать заказ
                </button>
            </div>
        </nav>
    </header>

    <main class = "catalog_main">
        <section class="order">
            <div class="orderContainer">
                <div class = "orderTicket">
                    <h2>Оформление заказа:</h2>
                    <form id="orderForm" class="order-form">
                    <div class="form-group">
                        <label for="name">ФИО:</label>
                        <input type="text" id="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Телефон:</label>
                        <input type="tel" id="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="address">Адрес доставки:</label>
                        <input type="address" id="address" required>
                    </div>
                </form>
                </div>
                <div class = "orderTicket">
                    <h2>Ваш товар:</h2>
                    <div id = "productCard">
                        <div id="productCard">
            <div class="product-card">
                <div class="product-image"><i class="bi bi-nvidia text-success display-1"></i></div>
                <h3 class="product-name">NVIDIA GeForce RTX 4070</h3>
                <div class="product-price">59 999 ₽</div>
                <div class="product-specs">
                    <ul class="list-unstyled">
                        <li><strong>Память:</strong> 12GB GDDR6X</li>
                        <li><strong>Интерфейс:</strong> PCIe 4.0</li>
                        <li><strong>Питание:</strong> 200W</li>
                        <li><strong>Производитель:</strong> NVIDIA</li>
                    </ul>
                </div>
                <div class="product-total mt-3 p-3 bg-light rounded">
                    <strong>Итого: <span id="totalPrice">59 999</span> ₽</strong>
                </div>
                <button class="btn btn-primary btn-lg w-100 mt-3" id="submitOrderBtn">
                    <i class="bi bi-cart me-2"></i>Оформить заказ
                </button>
            </div>
        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <button class="footer_button" onclick="">
                    Политика конфиденциальности
            </button>
            <button class="footer_button" onclick="">
                    Контакты
            </button>
            <button class="footer_button" onclick="">
                    Информация
            </button>
        </div>
    </footer>


</body>
</html>
